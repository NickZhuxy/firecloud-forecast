<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>火烧云质量预测 · Firecloud Quality</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<style>
  /* SunsetWx-style light, clean chrome around an interactive quality map. */
  :root{
    --bg:#f4f6f8; --panel:#ffffff; --ink:#1c2530; --soft:#5c6773; --muted:#8a96a3;
    --line:#dfe4ea; --accent:#f4622d;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{background:var(--bg); color:var(--ink); height:100%; overflow:hidden;
    font-family:"PingFang SC","Microsoft YaHei",system-ui,-apple-system,sans-serif;}
  #app{display:flex; flex-direction:column; height:100%;}

  header{display:flex; align-items:center; gap:18px; padding:11px 20px;
    background:var(--panel); border-bottom:1px solid var(--line); z-index:1200;}
  .brand{display:flex; align-items:baseline; gap:10px;}
  .brand .logo{font-size:20px;}
  .brand h1{font-size:17px; margin:0; font-weight:700; letter-spacing:.01em;}
  .brand .en{font-size:11px; color:var(--muted); letter-spacing:.16em; text-transform:uppercase;}
  header .spacer{flex:1;}
  .control{display:flex; align-items:center; gap:8px; font-size:13px; color:var(--soft);}
  header input[type=date]{background:#fff; color:var(--ink); border:1px solid var(--line);
    border-radius:7px; padding:6px 10px; font-size:13px; font-family:inherit;}
  .refresh{font-size:12px; color:var(--muted); text-align:right; line-height:1.5; min-width:150px;}
  .refresh b{color:var(--soft); font-weight:600;}

  #main{flex:1; position:relative;}
  #map{position:absolute; inset:0; background:#e9edf0;}
  .leaflet-container{background:#e9edf0;}

  /* SunsetWx-style title block baked over the map's top-left. */
  #titlecard{position:absolute; left:14px; top:14px; z-index:1100; max-width:min(70vw,520px);
    background:rgba(255,255,255,.92); border:1px solid var(--line); border-radius:12px;
    padding:11px 15px; box-shadow:0 6px 24px rgba(20,30,45,.12);}
  #titlecard .t{font-size:15px; font-weight:800; letter-spacing:.01em;}
  #titlecard .v{font-size:12px; color:var(--soft); margin-top:4px; font-variant-numeric:tabular-nums;}
  #titlecard .tag{font-size:11px; color:var(--muted); margin-top:5px;}

  #legend{position:absolute; left:14px; bottom:20px; z-index:1100;
    background:rgba(255,255,255,.94); border:1px solid var(--line); border-radius:10px;
    padding:10px 13px; font-size:11px; color:var(--soft); box-shadow:0 6px 24px rgba(20,30,45,.12);}
  #legend .cap{font-weight:600; color:var(--ink); font-size:11.5px;}
  #legend .scale{height:10px; width:220px; border-radius:5px; margin:7px 0 4px; border:1px solid var(--line);
    background:linear-gradient(90deg,#30123b,#4458cb,#3e9bfe,#18d6cb,#46f884,#a2fc3c,#e1dd37,#fea531,#f2611c,#c42503,#7a0403);}
  #legend .ends{display:flex; justify-content:space-between;}

  #status{position:absolute; left:50%; top:16px; transform:translateX(-50%); z-index:1300;
    background:rgba(255,255,255,.97); border:1px solid var(--line); border-radius:20px;
    padding:8px 18px; font-size:13px; color:var(--ink); display:none; align-items:center; gap:9px;
    box-shadow:0 6px 24px rgba(20,30,45,.18);}
  #status.show{display:flex;}
  .spin{width:14px; height:14px; border:2px solid var(--line); border-top-color:var(--accent);
    border-radius:50%; animation:sp .7s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}

  @media (max-width:560px){
    #titlecard{max-width:calc(100vw - 28px);}
    #legend .scale{width:150px;}
    .refresh{display:none;}
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">
      <span class="logo">🌇</span>
      <h1>火烧云质量预测</h1>
      <span class="en">Firecloud Quality · 中国</span>
    </div>
    <div class="spacer"></div>
    <div class="control">
      <label for="date">日期</label>
      <input type="date" id="date">
    </div>
    <div class="refresh" id="refresh">—</div>
  </header>

  <div id="main">
    <div id="map"></div>
    <div id="status"><span class="spin"></span><span id="status-text">计算中…</span></div>

    <div id="titlecard">
      <div class="t">火烧云质量 · 全国概览</div>
      <div class="v" id="valid">—</div>
      <div class="tag">颜色越暖 = 火烧云条件越好 · firecloud-forecast</div>
    </div>

    <div id="legend">
      <div class="cap">火烧云条件指数</div>
      <div class="scale"></div>
      <div class="ends"><span>差</span><span>好</span></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
const API_BASE = location.protocol.startsWith('http') ? '' : 'http://127.0.0.1:8848';

// Interactive, draggable/zoomable Leaflet map (the only enhancement we keep
// over a static SunsetWx-style image). No point-click analysis (#40).
const map=L.map('map',{zoomControl:true,worldCopyJump:true}).setView([35,105],4);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  {attribution:'© OpenStreetMap, © CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);

let overlay=null, fitted=false, refreshTimer=null;
let overlayController=null, overlayRequestSeq=0;
const statusEl=document.getElementById('status'), statusText=document.getElementById('status-text');
const dateInput=document.getElementById('date'), refreshEl=document.getElementById('refresh');
const validEl=document.getElementById('valid');

function chinaDateISO(){
  const parts=new Intl.DateTimeFormat('en-US',{timeZone:'Asia/Shanghai',year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(new Date());
  const v=Object.fromEntries(parts.map(p=>[p.type,p.value]));
  return `${v.year}-${v.month}-${v.day}`;
}
dateInput.value=chinaDateISO();
function showStatus(m){statusText.textContent=m;statusEl.classList.add('show');}
function hideStatus(){statusEl.classList.remove('show');}
function hhmm(iso){return new Intl.DateTimeFormat('zh-CN',{timeZone:'Asia/Shanghai',hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date(iso));}

async function loadOverlay(){
  if(refreshTimer){clearTimeout(refreshTimer);refreshTimer=null;}
  const requestSeq=++overlayRequestSeq;
  if(overlayController)overlayController.abort();
  const controller=new AbortController(); overlayController=controller;
  const date=dateInput.value;
  validEl.textContent=`Valid ${date}（日落前约 10 分钟评估）`;
  showStatus('正在加载全国火烧云预测图…');
  try{
    const res=await fetch(`${API_BASE}/api/overlay/cn?date=${date}`,{signal:controller.signal}).then(r=>r.json());
    if(requestSeq!==overlayRequestSeq)return;
    if(res.detail) throw new Error(res.detail);
    if(res.status==='error') throw new Error(res.error||'预测图生成失败');
    if(res.status==='building'&&!res.image){
      refreshEl.textContent='全国图后台生成中…';
      showStatus('首次生成全国图，完成后会自动显示…');
      refreshTimer=setTimeout(loadOverlay,(res.retry_after_seconds||4)*1000);
      return;
    }
    if(overlay){map.removeLayer(overlay);overlay=null;}
    if(res.image){overlay=L.imageOverlay(res.image,res.bounds,{opacity:0.85,interactive:false}).addTo(map);}
    if(!fitted && res.bounds){map.fitBounds(res.bounds);fitted=true;}
    if(res.status==='stale'){
      refreshEl.innerHTML=`缓存 <b>${hhmm(res.generated_utc)}</b> · 正在更新`;
      showStatus('已显示最近缓存，正在后台更新…');
      refreshTimer=setTimeout(loadOverlay,(res.retry_after_seconds||4)*1000);
    }else{
      refreshEl.innerHTML=`数据 <b>${hhmm(res.generated_utc)}</b> · 下次 <b>${hhmm(res.next_refresh_utc)}</b>`;
      scheduleRefresh(res.next_refresh_utc);
      hideStatus();
    }
  }catch(e){
    if(e.name==='AbortError'||requestSeq!==overlayRequestSeq)return;
    showStatus('出错：'+e.message);setTimeout(hideStatus,4000);
  }finally{
    if(requestSeq===overlayRequestSeq)overlayController=null;
  }
}

function scheduleRefresh(nextIso){
  if(refreshTimer) clearTimeout(refreshTimer);
  const ms=new Date(nextIso).getTime()-Date.now()+8000;
  if(ms>0 && ms<6*3600*1000) refreshTimer=setTimeout(loadOverlay, ms);
}

dateInput.addEventListener('change',loadOverlay);
loadOverlay();
</script>
</body>
</html>
